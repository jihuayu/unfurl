name: Server Benchmark

on:
  workflow_dispatch:
    inputs:
      bench_cache_sizes:
        description: Comma-separated cache sizes for the benchmark filter
        required: false
        default: "50,200,1000"
      bench_concurrencies:
        description: Comma-separated concurrency levels for the benchmark filter
        required: false
        default: "10,50"
      bench_hit_modes:
        description: Comma-separated hit modes for the benchmark filter
        required: false
        default: "mixed_80_20"
      bench_endpoints:
        description: Comma-separated endpoints for the benchmark filter
        required: false
        default: "api,image"
      bench_image_backends:
        description: Comma-separated image cache backends for the benchmark filter
        required: false
        default: "sqlite,s3"
      bench_low_memory_modes:
        description: Comma-separated low memory mode states for benchmark shards
        required: false
        default: "false,true"
      run_lifecycle_bench:
        description: Run the long lifecycle benchmark job
        required: false
        default: "false"
  pull_request:
    paths:
      - ".github/workflows/server-benchmark.yml"
      - "server/**"
  push:
    paths:
      - ".github/workflows/server-benchmark.yml"
      - "server/**"

permissions:
  contents: read

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server -> target

      - name: Build benchmark binaries
        working-directory: server
        run: cargo build --release --bin benchmark --bin lifecycle_bench --bin image_worker

      - name: Upload benchmark binaries
        uses: actions/upload-artifact@v4
        with:
          name: server-benchmark-binaries
          path: |
            server/target/release/benchmark
            server/target/release/lifecycle_bench
            server/target/release/image_worker

  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      bench_hit_modes: ${{ steps.defaults.outputs.bench_hit_modes }}
      bench_endpoints: ${{ steps.defaults.outputs.bench_endpoints }}
      bench_image_backends: ${{ steps.defaults.outputs.bench_image_backends }}
    steps:
      - name: Compute benchmark matrix
        id: matrix
        shell: bash
        env:
          BENCH_CACHE_SIZES_INPUT: ${{ github.event.inputs.bench_cache_sizes || '50,200,1000' }}
          BENCH_CONCURRENCIES_INPUT: ${{ github.event.inputs.bench_concurrencies || '10,50' }}
          BENCH_LOW_MEMORY_MODES_INPUT: ${{ github.event.inputs.bench_low_memory_modes || 'false,true' }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          cache_sizes = [item.strip() for item in os.environ["BENCH_CACHE_SIZES_INPUT"].split(",") if item.strip()]
          concurrencies = [item.strip() for item in os.environ["BENCH_CONCURRENCIES_INPUT"].split(",") if item.strip()]
          low_memory_modes = [item.strip().lower() for item in os.environ["BENCH_LOW_MEMORY_MODES_INPUT"].split(",") if item.strip()]

          include = []
          for cache_size in cache_sizes:
              for concurrency in concurrencies:
                  for low_memory_mode in low_memory_modes:
                      mode_label = "lowmem" if low_memory_mode == "true" else "standard"
                      include.append({
                          "cache_size": cache_size,
                          "concurrency": concurrency,
                          "low_memory_mode": low_memory_mode,
                          "artifact_suffix": f"cache{cache_size}-conc{concurrency}-{mode_label}",
                      })

          print(f"matrix={json.dumps({'include': include})}")
          PY

      - name: Resolve shared filters
        id: defaults
        shell: bash
        env:
          BENCH_HIT_MODES_INPUT: ${{ github.event.inputs.bench_hit_modes || 'mixed_80_20' }}
          BENCH_ENDPOINTS_INPUT: ${{ github.event.inputs.bench_endpoints || 'api,image' }}
          BENCH_IMAGE_BACKENDS_INPUT: ${{ github.event.inputs.bench_image_backends || 'sqlite,s3' }}
        run: |
          {
            echo "bench_hit_modes=${BENCH_HIT_MODES_INPUT}"
            echo "bench_endpoints=${BENCH_ENDPOINTS_INPUT}"
            echo "bench_image_backends=${BENCH_IMAGE_BACKENDS_INPUT}"
          } >> "$GITHUB_OUTPUT"

  benchmark:
    needs:
      - build-binaries
      - plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      LOW_MEMORY_MODE: ${{ matrix.low_memory_mode }}
      BENCH_CACHE_SIZES: ${{ matrix.cache_size }}
      BENCH_CONCURRENCIES: ${{ matrix.concurrency }}
      BENCH_HIT_MODES: ${{ needs.plan.outputs.bench_hit_modes }}
      BENCH_ENDPOINTS: ${{ needs.plan.outputs.bench_endpoints }}
      BENCH_IMAGE_BACKENDS: ${{ needs.plan.outputs.bench_image_backends }}
      BENCH_S3_ENDPOINT: http://127.0.0.1:9000
      BENCH_S3_REGION: us-east-1
      BENCH_S3_BUCKET: unfurl-benchmark
      BENCH_S3_ACCESS_KEY_ID: minioadmin
      BENCH_S3_SECRET_ACCESS_KEY: minioadmin
      BENCH_S3_PUBLIC_BASE_URL: http://127.0.0.1:9000/unfurl-benchmark
      BENCH_S3_FORCE_PATH_STYLE: "true"
      BENCH_S3_PREFIX: gha-${{ matrix.artifact_suffix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download benchmark binaries
        uses: actions/download-artifact@v4
        with:
          name: server-benchmark-binaries
          path: server/target/release

      - name: Make binaries executable
        shell: bash
        run: chmod +x server/target/release/benchmark server/target/release/lifecycle_bench server/target/release/image_worker

      - name: Start MinIO container
        shell: bash
        run: |
          docker run -d \
            --name benchmark-minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"

      - name: Wait for MinIO
        shell: bash
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become healthy in time" >&2
          exit 1

      - name: Run server benchmark shard
        working-directory: server
        run: ./target/release/benchmark

      - name: Upload shard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-benchmark-${{ matrix.artifact_suffix }}
          path: |
            server/benchmark-results.json

      - name: Stop MinIO container
        if: always()
        shell: bash
        run: docker rm -f benchmark-minio || true

  aggregate:
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-benchmark-*
          path: server/artifacts
          merge-multiple: false

      - name: Merge benchmark reports
        shell: bash
        run: |
          mapfile -t inputs < <(find server/artifacts -type f -name 'benchmark-results.json' | sort)
          python3 server/scripts/merge_benchmark_reports.py \
            --inputs "${inputs[@]}" \
            --output server/benchmark-results.json

      - name: Render benchmark report
        run: python3 server/scripts/render_benchmark_report.py --input server/benchmark-results.json --output server/benchmark-report.md

      - name: Publish benchmark summary
        shell: bash
        run: cat server/benchmark-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-benchmark-report
          path: |
            server/benchmark-results.json
            server/benchmark-report.md

  lifecycle-benchmark:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_lifecycle_bench || 'false') == 'true' }}
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - memory_mode: standard
            low_memory_mode: "false"
            artifact_suffix: standard
          - memory_mode: low_memory
            low_memory_mode: "true"
            artifact_suffix: low_memory
    env:
      LOW_MEMORY_MODE: ${{ matrix.low_memory_mode }}
      LIFECYCLE_MEMORY_MODES: ${{ matrix.memory_mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download benchmark binaries
        uses: actions/download-artifact@v4
        with:
          name: server-benchmark-binaries
          path: server/target/release

      - name: Make binaries executable
        shell: bash
        run: chmod +x server/target/release/benchmark server/target/release/lifecycle_bench server/target/release/image_worker

      - name: Run lifecycle benchmark
        working-directory: server
        run: ./target/release/lifecycle_bench

      - name: Rename lifecycle benchmark outputs
        working-directory: server
        run: |
          mv lifecycle-bench-results.json lifecycle-bench-results-${{ matrix.artifact_suffix }}.json

      - name: Render lifecycle benchmark report
        run: python3 server/scripts/render_lifecycle_benchmark_report.py --input server/lifecycle-bench-results-${{ matrix.artifact_suffix }}.json --output server/lifecycle-benchmark-report-${{ matrix.artifact_suffix }}.md

      - name: Publish lifecycle benchmark summary
        shell: bash
        run: cat server/lifecycle-benchmark-report-${{ matrix.artifact_suffix }}.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lifecycle benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-benchmark-report-${{ matrix.artifact_suffix }}
          path: |
            server/lifecycle-bench-results-${{ matrix.artifact_suffix }}.json
            server/lifecycle-benchmark-report-${{ matrix.artifact_suffix }}.md
